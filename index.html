<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Gemma4 Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3352;
      --accent: #6c8eff;
      --accent2: #a78bfa;
      --text: #e2e8f0;
      --text-muted: #8b92aa;
      --user-bubble: #1e3a5f;
      --ai-bubble: #1e2235;
      --success: #34d399;
      --error: #f87171;
      --radius: 14px;
      --radius-sm: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-main {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      gap: 10px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
      flex: 1;
    }

    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background .3s;
      flex-shrink: 0;
    }
    .status-dot.connected { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.error { background: var(--error); }

    .header-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    /* Settings panel (collapsed on mobile) */
    .settings-panel {
      padding: 10px 14px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .settings-panel.collapsed { display: none; }

    .input-field {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      flex: 1;
      min-width: 140px;
    }

    .input-field label {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .input-field input {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 13px;
      outline: none;
      flex: 1;
      min-width: 0;
    }

    .btn {
      padding: 7px 12px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity .2s, transform .1s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .btn:hover { opacity: .85; }
    .btn:active { transform: scale(.96); }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: #3d1a1a; color: var(--error); border: 1px solid #5a2020; }
    .btn-icon {
      width: 34px; height: 34px;
      padding: 0;
      justify-content: center;
      font-size: 16px;
    }

    /* ── Layout ── */
    .app-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    aside {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      transition: width .25s ease, opacity .25s;
    }

    aside.hidden {
      width: 0;
      opacity: 0;
      pointer-events: none;
    }

    .sidebar-section {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-section h3 {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 8px;
    }

    .field-group { margin-bottom: 8px; }
    .field-group:last-child { margin-bottom: 0; }
    .field-group label { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 4px; }

    .text-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 13px;
      padding: 6px 10px;
      outline: none;
    }
    .text-input:focus { border-color: var(--accent); }

    textarea.sys-prompt {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 12px;
      padding: 7px 10px;
      outline: none;
      resize: none;
      height: 72px;
      font-family: inherit;
      line-height: 1.5;
    }
    textarea.sys-prompt:focus { border-color: var(--accent); }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .slider-row input[type=range] {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .slider-val {
      font-size: 11px;
      color: var(--accent);
      min-width: 26px;
      text-align: right;
      font-weight: 600;
    }

    .model-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px;
    }

    .model-item {
      padding: 7px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      color: var(--text-muted);
      transition: background .15s;
      word-break: break-all;
    }
    .model-item:hover { background: var(--surface2); color: var(--text); }
    .model-item.active { background: var(--accent); color: #fff; }

    .model-list-empty {
      padding: 10px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
    }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      gap: 10px;
      width: 100%;
    }
    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .msg.user .msg-avatar { background: var(--user-bubble); }
    .msg.assistant .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }

    .msg-content {
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-width: min(75%, 520px);
    }
    .msg.user .msg-content { align-items: flex-end; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: var(--user-bubble);
      border: 1px solid #2b4f7a;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .msg-bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-image {
      max-width: 100%;
      max-height: 240px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      margin-bottom: 4px;
      object-fit: contain;
    }

    .msg-time { font-size: 10px; color: var(--text-muted); padding: 0 3px; }

    .typing-wrap {
      padding: 0 16px 8px;
    }

    .typing-indicator {
      display: none;
      align-items: center;
      gap: 5px;
      padding: 10px 14px;
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .typing-indicator.show { display: flex; }
    .typing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .5; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 32px 20px;
    }
    .empty-state .big-icon { font-size: 48px; opacity: .35; }
    .empty-state h2 { font-size: 17px; color: var(--text); }
    .empty-state p { font-size: 13px; max-width: 300px; line-height: 1.6; }

    /* ── Input bar ── */
    .input-bar {
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .image-preview-strip {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .img-thumb {
      position: relative;
      width: 64px; height: 64px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .img-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .img-thumb-remove {
      position: absolute;
      top: 2px; right: 2px;
      background: rgba(0,0,0,.75);
      color: var(--error);
      border: none;
      border-radius: 50%;
      width: 18px; height: 18px;
      font-size: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .input-row textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      padding: 11px 14px;
      outline: none;
      resize: none;
      line-height: 1.5;
      max-height: 140px;
      min-height: 46px;
      transition: border-color .2s;
      -webkit-appearance: none;
    }
    .input-row textarea:focus { border-color: var(--accent); }
    .input-row textarea::placeholder { color: var(--text-muted); }

    .input-btns {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .icon-btn {
      width: 42px; height: 42px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      transition: background .15s, border-color .15s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:hover { background: var(--accent); border-color: var(--accent); }
    .icon-btn.send { background: var(--accent); border-color: var(--accent); color: #fff; }
    .icon-btn.send:hover { opacity: .85; }
    .icon-btn:disabled { opacity: .35; cursor: not-allowed; }

    #fileInput { display: none; }

    /* ── Toast ── */
    .toast-container {
      position: fixed;
      bottom: 80px; right: 14px;
      display: flex; flex-direction: column; gap: 6px;
      z-index: 999;
      pointer-events: none;
    }
    .toast {
      padding: 9px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      animation: slideIn .25s ease;
      max-width: 280px;
      pointer-events: all;
    }
    .toast.info { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
    .toast.success { background: #0d2e22; border: 1px solid var(--success); color: var(--success); }
    .toast.error { background: #2e0d0d; border: 1px solid var(--error); color: var(--error); }
    @keyframes slideIn {
      from { transform: translateX(50px); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }

    /* ── Mobile overlay for sidebar ── */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 50;
    }
    .sidebar-overlay.show { display: block; }

    /* ── Mobile: sidebar slides from left ── */
    @media (max-width: 600px) {
      aside {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        z-index: 100;
        width: 280px !important;
        opacity: 1 !important;
        transform: translateX(-100%);
        transition: transform .25s ease;
        overflow-y: auto;
      }
      aside.open {
        transform: translateX(0);
      }
      /* Always show settings panel on mobile in header */
      .settings-panel {
        flex-direction: column;
        align-items: stretch;
      }
      .input-field {
        min-width: unset;
      }
      .header-main .logo span { display: none; }
    }

    @media (min-width: 601px) {
      .sidebar-overlay { display: none !important; }
      aside {
        transform: none !important;
      }
      aside.hidden {
        width: 0 !important;
        opacity: 0 !important;
      }
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-main">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <span>Gemma4 Chat</span>
      <div class="status-dot" id="statusDot"></div>
    </div>
    <div class="header-actions">
      <!-- Mobile sidebar toggle -->
      <button class="btn btn-ghost btn-icon" onclick="toggleSidebar()" title="Settings">⚙️</button>
      <button class="btn btn-ghost btn-icon" onclick="testConnection()" title="Test">🔌</button>
      <button class="btn btn-danger btn-icon" onclick="clearChat()" title="Clear">🗑</button>
    </div>
  </div>

  <!-- Settings row (server + API key) -->
  <div class="settings-panel" id="settingsPanel">
    <div class="input-field" style="flex:2; min-width:160px;">
      <label>Server</label>
      <input id="serverUrl" type="url" value="https://kruger-intl-duration-differently.trycloudflare.com" placeholder="https://xxxx.trycloudflare.com"
        inputmode="url" autocomplete="off" autocorrect="off" spellcheck="false" />
    </div>
    <div class="input-field" style="flex:2; min-width:140px;">
      <label>API Key</label>
      <input id="apiKey" type="password" placeholder="sk-lm-..."
        autocomplete="off" autocorrect="off" spellcheck="false" />
    </div>
    <div style="display:flex;gap:6px;flex-shrink:0;">
      <button class="btn btn-ghost" onclick="fetchModels()" style="font-size:12px;">⟳ Models</button>
    </div>
  </div>
</header>

<!-- Sidebar overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="app-body">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-section">
      <h3>Model</h3>
      <div class="field-group">
        <label>Model ID</label>
        <input id="modelInput" type="text" class="text-input" placeholder="gemma-4-27b-it" />
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Parameters</h3>
      <div class="field-group">
        <label>Temperature</label>
        <div class="slider-row">
          <input type="range" id="tempSlider" min="0" max="2" step="0.05" value="0.7"
            oninput="document.getElementById('tempVal').textContent=this.value" />
          <span class="slider-val" id="tempVal">0.7</span>
        </div>
      </div>
      <div class="field-group">
        <label>Max Tokens</label>
        <div class="slider-row">
          <input type="range" id="maxTokensSlider" min="128" max="8192" step="128" value="2048"
            oninput="document.getElementById('maxTokensVal').textContent=this.value" />
          <span class="slider-val" id="maxTokensVal">2048</span>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>System Prompt</h3>
      <textarea class="sys-prompt" id="systemPrompt">คุณคือผู้ช่วย AI ที่ฉลาดและเป็นประโยชน์ ตอบภาษาไทยเมื่อผู้ใช้พูดภาษาไทย</textarea>
    </div>

    <div class="sidebar-section">
      <h3>Models</h3>
    </div>
    <div class="model-list" id="modelList">
      <div class="model-list-empty">กด ⟳ Models เพื่อโหลด</div>
    </div>
  </aside>

  <!-- Chat -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="big-icon">✦</div>
        <h2>Gemma4 Chat</h2>
        <p>ใส่ Server URL และ API Key<br/>แล้วกด 🔌 Test เพื่อเชื่อมต่อ</p>
      </div>
    </div>

    <div class="typing-wrap">
      <div class="msg assistant" style="display:none;" id="typingRow">
        <div class="msg-avatar">✦</div>
        <div>
          <div class="typing-indicator show" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="input-bar">
      <div class="image-preview-strip" id="imagePreviewStrip"></div>
      <div class="input-row">
        <textarea id="userInput" placeholder="พิมพ์ข้อความ..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <div class="input-btns">
          <label class="icon-btn" title="อัปโหลดรูป" onclick="document.getElementById('fileInput').click()">🖼</label>
          <button class="icon-btn send" title="ส่ง" onclick="sendMessage()" id="sendBtn">➤</button>
        </div>
      </div>
      <input type="file" id="fileInput" accept="image/*" multiple onchange="handleImageUpload(event)" />
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  // ── State ──
  let history = [];
  let pendingImages = [];
  let isLoading = false;

  // ── Helpers ──
  const $ = id => document.getElementById(id);
  function getServer()    { return $('serverUrl').value.replace(/\/$/, ''); }
  function getModel()     { return $('modelInput').value.trim() || 'gemma-4-27b-it'; }
  function getTemp()      { return parseFloat($('tempSlider').value); }
  function getMaxTokens() { return parseInt($('maxTokensSlider').value); }
  function getSystem()    { return $('systemPrompt').value.trim(); }
  function getApiKey()    { return $('apiKey').value.trim(); }

  function getAuthHeaders() {
    const key = getApiKey();
    return key
      ? { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` }
      : { 'Content-Type': 'application/json' };
  }

  function now() {
    return new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
  }

  function toast(msg, type = 'info', duration = 3500) {
    const c = $('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), duration);
  }

  function setStatus(state) {
    $('statusDot').className = 'status-dot ' + state;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function scrollToBottom() {
    const m = $('messages');
    m.scrollTop = m.scrollHeight;
  }

  // ── Sidebar ──
  function toggleSidebar() {
    const s = $('sidebar');
    const isMobile = window.innerWidth <= 600;
    if (isMobile) {
      s.classList.toggle('open');
      $('sidebarOverlay').classList.toggle('show', s.classList.contains('open'));
    } else {
      s.classList.toggle('hidden');
    }
  }

  function closeSidebar() {
    $('sidebar').classList.remove('open');
    $('sidebarOverlay').classList.remove('show');
  }

  // Auto-close sidebar on mobile after model select
  function selectModel(id) {
    $('modelInput').value = id;
    if (window.innerWidth <= 600) closeSidebar();
  }

  // ── Connection ──
  async function testConnection() {
    try {
      setStatus('');
      const r = await fetch(`${getServer()}/v1/models`, {
        signal: AbortSignal.timeout(6000),
        headers: getAuthHeaders()
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      setStatus('connected');
      toast('เชื่อมต่อสำเร็จ ✓', 'success');
    } catch (e) {
      setStatus('error');
      toast(`เชื่อมต่อไม่ได้: ${e.message}`, 'error', 5000);
    }
  }

  async function fetchModels() {
    try {
      const r = await fetch(`${getServer()}/v1/models`, {
        signal: AbortSignal.timeout(6000),
        headers: getAuthHeaders()
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      const models = data.data || [];
      const list = $('modelList');
      if (!models.length) {
        list.innerHTML = '<div class="model-list-empty">ไม่พบโมเดล</div>';
        return;
      }
      list.innerHTML = '';
      models.forEach(m => {
        const div = document.createElement('div');
        div.className = 'model-item';
        div.textContent = m.id;
        div.title = m.id;
        div.onclick = () => {
          selectModel(m.id);
          list.querySelectorAll('.model-item').forEach(x => x.classList.remove('active'));
          div.classList.add('active');
          toast(`เลือก: ${m.id}`, 'info');
        };
        list.appendChild(div);
      });
      setStatus('connected');
      toast(`พบ ${models.length} โมเดล`, 'success');
    } catch (e) {
      setStatus('error');
      toast(`โหลดโมเดลไม่ได้: ${e.message}`, 'error', 5000);
    }
  }

  // ── Images ──
  function handleImageUpload(e) {
    Array.from(e.target.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        pendingImages.push({
          base64: ev.target.result.split(',')[1],
          mimeType: file.type || 'image/jpeg',
          previewUrl: ev.target.result,
          name: file.name
        });
        renderPreviews();
      };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  }

  function renderPreviews() {
    const strip = $('imagePreviewStrip');
    strip.innerHTML = '';
    pendingImages.forEach((img, i) => {
      const w = document.createElement('div');
      w.className = 'img-thumb';
      w.innerHTML = `<img src="${img.previewUrl}" alt="${img.name}" />`
        + `<button class="img-thumb-remove" onclick="removeImage(${i})">✕</button>`;
      strip.appendChild(w);
    });
  }

  function removeImage(i) {
    pendingImages.splice(i, 1);
    renderPreviews();
  }

  // ── Chat ──
  function handleKey(e) {
    // On mobile, Enter = newline; on desktop Enter = send
    if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 600) {
      e.preventDefault();
      sendMessage();
    }
  }

  function hideEmptyState() {
    const es = $('emptyState');
    if (es) es.style.display = 'none';
  }

  function setTyping(show) {
    $('typingRow').style.display = show ? 'flex' : 'none';
    if (show) scrollToBottom();
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = $('userInput');
    const text = input.value.trim();
    if (!text && !pendingImages.length) return;

    isLoading = true;
    $('sendBtn').disabled = true;

    const imgs = [...pendingImages];
    const imgUrls = imgs.map(i => i.previewUrl);

    let userContent;
    if (imgs.length) {
      userContent = [];
      imgs.forEach(img => userContent.push({
        type: 'image_url',
        image_url: { url: `data:${img.mimeType};base64,${img.base64}` }
      }));
      userContent.push({ type: 'text', text: text || 'วิเคราะห์ภาพนี้ให้หน่อย' });
    } else {
      userContent = text;
    }

    input.value = '';
    input.style.height = 'auto';
    pendingImages = [];
    renderPreviews();

    // Show user message
    hideEmptyState();
    const container = $('messages');

    const userWrap = document.createElement('div');
    userWrap.className = 'msg user';
    const uAvatar = document.createElement('div');
    uAvatar.className = 'msg-avatar';
    uAvatar.textContent = '👤';
    const uContent = document.createElement('div');
    uContent.className = 'msg-content';
    imgUrls.forEach(url => {
      const img = document.createElement('img');
      img.src = url; img.className = 'msg-image';
      uContent.appendChild(img);
    });
    const uBubble = document.createElement('div');
    uBubble.className = 'msg-bubble';
    uBubble.textContent = typeof userContent === 'string' ? userContent
      : userContent.find(c => c.type === 'text')?.text || '';
    const uTime = document.createElement('div');
    uTime.className = 'msg-time';
    uTime.textContent = now();
    uContent.appendChild(uBubble);
    uContent.appendChild(uTime);
    userWrap.appendChild(uAvatar);
    userWrap.appendChild(uContent);
    container.appendChild(userWrap);
    scrollToBottom();

    history.push({ role: 'user', content: userContent });

    const messages = [];
    const sys = getSystem();
    if (sys) messages.push({ role: 'system', content: sys });
    history.forEach(h => messages.push(h));

    setTyping(true);

    try {
      const resp = await fetch(`${getServer()}/v1/chat/completions`, {
        method: 'POST',
        headers: getAuthHeaders(),
        body: JSON.stringify({
          model: getModel(),
          messages,
          temperature: getTemp(),
          max_tokens: getMaxTokens(),
          stream: true
        })
      });

      if (!resp.ok) {
        const err = await resp.text();
        throw new Error(`HTTP ${resp.status}: ${err.slice(0, 200)}`);
      }

      setTyping(false);

      // Build AI bubble
      const aiWrap = document.createElement('div');
      aiWrap.className = 'msg assistant';
      const aiAvatar = document.createElement('div');
      aiAvatar.className = 'msg-avatar';
      aiAvatar.textContent = '✦';
      const aiContent = document.createElement('div');
      aiContent.className = 'msg-content';
      const aiBubble = document.createElement('div');
      aiBubble.className = 'msg-bubble';
      aiBubble.textContent = '';
      const aiTime = document.createElement('div');
      aiTime.className = 'msg-time';
      aiTime.textContent = now();
      aiContent.appendChild(aiBubble);
      aiContent.appendChild(aiTime);
      aiWrap.appendChild(aiAvatar);
      aiWrap.appendChild(aiContent);
      container.appendChild(aiWrap);
      scrollToBottom();

      // Stream
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let fullText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        for (const line of chunk.split('\n')) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6);
          if (data === '[DONE]') break;
          try {
            const json = JSON.parse(data);
            const delta = json.choices?.[0]?.delta?.content || '';
            fullText += delta;
            aiBubble.textContent = fullText;
            scrollToBottom();
          } catch {}
        }
      }

      history.push({ role: 'assistant', content: fullText });
      setStatus('connected');

    } catch (e) {
      setTyping(false);
      toast(`ผิดพลาด: ${e.message}`, 'error', 6000);
      setStatus('error');
      history.pop();
    }

    isLoading = false;
    $('sendBtn').disabled = false;
    input.focus();
  }

  function clearChat() {
    history = [];
    pendingImages = [];
    renderPreviews();
    $('messages').innerHTML = `
      <div class="empty-state" id="emptyState">
        <div class="big-icon">✦</div>
        <h2>Gemma4 Chat</h2>
        <p>ใส่ Server URL และ API Key<br/>แล้วกด 🔌 Test เพื่อเชื่อมต่อ</p>
      </div>`;
    toast('ล้างการสนทนาแล้ว', 'info');
  }

  // ── Init ──
  // On desktop, focus input; on mobile skip (prevents keyboard popup)
  if (window.innerWidth > 600) $('userInput').focus();

  // Show settings by default on desktop, collapsed on mobile
  if (window.innerWidth <= 600) {
    $('settingsPanel').classList.add('collapsed');
  }
  // Settings toggle for mobile via ⚙️ button — just show/hide settings panel
  // Actually we always show settings panel on mobile too for usability
  // Re-enable it:
  $('settingsPanel').classList.remove('collapsed');
</script>
</body>
</html>
