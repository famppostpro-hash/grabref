// ─── Supabase helpers ────────────────────────────────────────
async function sbGetAll(table) {
  const { data, error } = await supabase.from(table).select('*').order('created_at', { ascending: false });
  if (error) throw error;
  return data || [];
}
async function sbUpsert(table, item) {
  const { error } = await supabase.from(table).upsert(item);
  if (error) throw error;
}
async function sbDelete(table, id) {
  const { error } = await supabase.from(table).delete().eq('id', id);
  if (error) throw error;
}
async function sbUploadImage(file, path) {
  const { data, error } = await supabase.storage.from(BUCKET).upload(path, file, { upsert: true });
  if (error) throw error;
  const { data: urlData } = supabase.storage.from(BUCKET).getPublicUrl(path);
  return urlData.publicUrl;
}
async function sbUploadBase64(base64, path) {
  const res = await fetch(base64);
  const blob = await res.blob();
  return sbUploadImage(blob, path);
}
async function sbDeleteImage(path) {
  await supabase.storage.from(BUCKET).remove([path]);
}

// ─── Utils ───────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function autoTag(item) {
  const tags = [];
  const text = `${item.title||''} ${item.note||''} ${item.source_url||''}`.toLowerCase();
  const rules = [
    [['youtube.com','youtu.be'],'youtube'], [['twitter.com','x.com'],'twitter'],
    [['instagram.com'],'instagram'], [['pinterest.com'],'pinterest'],
    [['dribbble.com'],'dribbble'], [['behance.net'],'behance'],
    [['figma.com'],'figma'], [['github.com'],'github'],
    [['medium.com'],'article'], [['reddit.com'],'reddit'],
    [['tiktok.com'],'tiktok'],
  ];
  for (const [kws, tag] of rules) { if (kws.some(k => text.includes(k))) tags.push(tag); }
  if (item.type==='image') tags.push('image');
  if (item.type==='link') tags.push('link');
  if (item.type==='text') tags.push('note');
  if (text.match(/design|ui|ux|layout/)) tags.push('design');
  if (text.match(/code|dev|api|react|python/)) tags.push('code');
  if (text.match(/photo|photograph|camera/)) tags.push('photo');
  if (text.match(/color|palette|gradient/)) tags.push('color');
  if (text.match(/font|typo|typeface/)) tags.push('typography');
  if (text.match(/brand|logo|identity/)) tags.push('branding');
  if (text.match(/video|clip|reel/)) tags.push('video');
  if (text.match(/music|song|audio/)) tags.push('audio');
  if (text.match(/recipe|food|cook/)) tags.push('food');
  if (text.match(/travel|trip|hotel/)) tags.push('travel');
  return [...new Set(tags)];
}

// ─── Toast ───────────────────────────────────────────────────
function Toast({ toasts }) {
  return (
    <div style={{ position:'fixed', bottom:16, right:16, zIndex:2000, display:'flex', flexDirection:'column', gap:6 }}>
      {toasts.map(t => (
        <div key={t.id} className="animate-in" style={{
          padding:'8px 14px', borderRadius:'var(--radius)',
          background: t.type==='error' ? '#3f1111' : t.type==='success' ? '#0f2e1a' : '#1e1e22',
          border: `1px solid ${t.type==='error'?'#7f1d1d':t.type==='success'?'#14532d':'var(--border)'}`,
          color: t.type==='error'?'#fca5a5':t.type==='success'?'#86efac':'var(--text)',
          fontSize:12, maxWidth:280,
        }}>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

function useToast() {
  const [toasts, setToasts] = useState([]);
  function toast(msg, type='info') {
    const id = uid();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3000);
  }
  return { toasts, toast };
}

  return (

      display:'inline-flex', alignItems:'center', gap:4,
      padding:'2px 8px', fontSize:11, fontWeight:500,
      fontFamily:'var(--font-mono)', letterSpacing:'0.02em',
      background: active ? 'var(--accent-dim)' : 'var(--tag-bg)',
      color: active ? 'var(--accent)' : 'var(--text-dim)',
      border:`1px solid ${active?'var(--accent)':'transparent'}`,
      borderRadius:3, cursor: onClick?'pointer':'default',
      userSelect:'none', transition:'all 0.15s',
    }}>
      {label}
      {removable && <span onClick={e=>{e.stopPropagation();onRemove?.();}} style={{cursor:'pointer',opacity:0.6,marginLeft:2}}>×</span>}
    </span>
  );
}

            {editing && (
              <input value={tagInput} onChange={e=>setTagInput(e.target.value)}
                onKeyDown={e=>{
                  if ((e.key==='Enter'||e.key===',') && tagInput.trim()) {
                    e.preventDefault();
                    const t = tagInput.trim().toLowerCase().replace(/,/g,'');
                    if (t && !tags.includes(t)) setTags([...tags, t]);
                    setTagInput('');
                  }
                }}
                placeholder="Add tag and press Enter"
                style={{
                  background:'var(--bg)', border:'1px solid var(--border)',
                  borderRadius:'var(--radius)', padding:'5px 8px',
                  fontSize:12, color:'var(--text)', outline:'none', width:180,
                }}
              />
            )}
          </div>

          <div style={{ fontSize:11, color:'var(--text-muted)', display:'flex', gap:16 }}>
            <span>Added {new Date(item.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</span>
            <span style={{ textTransform:'capitalize' }}>{item.type}</span>
            <span style={{ display:'flex', alignItems:'center', gap:3 }}>{I.cloud} Synced</span>
          </div>

          <div style={{ display:'flex', gap:8, marginTop:16, paddingTop:16, borderTop:'1px solid var(--border)' }}>
            <button onClick={()=>{onDelete(item.id);onClose();}} style={{
              background:'var(--danger-dim)', border:'1px solid transparent',
              borderRadius:'var(--radius)', padding:'6px 12px',
              color:'var(--danger)', cursor:'pointer', fontSize:12,
              display:'flex', alignItems:'center', gap:4,
            }}>{I.trash} Delete</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Add Modal ───────────────────────────────────────────────
function AddModal({ onClose, onAdd, collections }) {
  const [mode, setMode] = useState('link');
  const [url, setUrl] = useState('');
  const [title, setTitle] = useState('');
  const [note, setNote] = useState('');
  const [imageData, setImageData] = useState(null);
  const [imageFile, setImageFile] = useState(null);
  const [collection, setCollection] = useState('');
  const [saving, setSaving] = useState(false);
  const fileRef = useRef(null);

  function handleFile(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    setImageFile(file);
    const reader = new FileReader();
    reader.onload = ev => {
      setImageData(ev.target.result);
      if (!title) setTitle(file.name.replace(/\.[^.]+$/, ''));
    };
    reader.readAsDataURL(file);
  }

  function handlePaste(e) {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        const file = item.getAsFile();
        setImageFile(file);
        const reader = new FileReader();
        reader.onload = ev => {
          setImageData(ev.target.result);
          setMode('image');
          if (!title) setTitle('Pasted image');
        };
        reader.readAsDataURL(file);
        return;
      }
      if (item.type==='text/plain') {
        item.getAsString(text => {
          if (text.match(/^https?:\/\//)) { setUrl(text.trim()); setMode('link'); }
          else { setNote(text); setMode('text'); }
        });
      }
    }
  }

  async function submit() {
    setSaving(true);
    try {
      let thumbnailUrl = null;
      let storagePath = null;

      if (imageData || imageFile) {
        const path = `${uid()}.jpg`;
        if (imageFile) {
          thumbnailUrl = await sbUploadImage(imageFile, path);
        } else if (imageData) {
          thumbnailUrl = await sbUploadBase64(imageData, path);
        }
        storagePath = path;
      } else if (mode==='link' && url) {
        thumbnailUrl = `https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=${encodeURIComponent(url)}&size=128`;
      }

      const ref = {
        id: uid(),
        type: mode,
        title: title || (mode==='link' ? url.replace(/^https?:\/\/(www\.)?/,'').split('/')[0] : mode==='text' ? note.slice(0,50) : 'Untitled'),
        note: note || null,
        source_url: mode==='link' ? url : null,
        thumbnail_url: thumbnailUrl,
        storage_path: storagePath,
        collection_id: collection || null,
        tags: [],
        created_at: Date.now(),
      };
      ref.tags = autoTag(ref);
      await onAdd(ref);
      onClose();
    } catch(err) {
      console.error(err);
    } finally {
      setSaving(false);
    }
  }

  return (
    <div onClick={onClose} style={{
      position:'fixed', inset:0, zIndex:1000,
      background:'rgba(0,0,0,0.75)', backdropFilter:'blur(8px)',
      display:'flex', alignItems:'center', justifyContent:'center', padding:20,
    }}>
      <div className="animate-slide-up" onClick={e=>e.stopPropagation()} onPaste={handlePaste}
        style={{
          background:'var(--bg-card)', border:'1px solid var(--border)',
          borderRadius:'var(--radius-lg)', width:'100%', maxWidth:480, overflow:'hidden',
        }}
      >
        <div style={{
          padding:'14px 16px', borderBottom:'1px solid var(--border)',
          display:'flex', justifyContent:'space-between', alignItems:'center',
        }}>
          <span style={{ fontWeight:600, fontSize:14 }}>Add Reference</span>
          <button onClick={onClose} style={{ background:'none', border:'none', color:'var(--text-dim)', cursor:'pointer' }}>{I.x}</button>
        </div>

        <div style={{ display:'flex', borderBottom:'1px solid var(--border)' }}>
          {[['link',I.link,'Link'],['image',I.image,'Image'],['text',I.paste,'Note']].map(([m,icon,label]) => (
            <button key={m} onClick={()=>setMode(m)} style={{
              flex:1, padding:'10px 0', background:'none', border:'none',
              borderBottom: mode===m ? '2px solid var(--accent)' : '2px solid transparent',
              color: mode===m ? 'var(--accent)' : 'var(--text-dim)',
              cursor:'pointer', fontSize:12, fontWeight:500,
              display:'flex', alignItems:'center', justifyContent:'center', gap:5,
            }}>{icon}{label}</button>
          ))}
        </div>

        <div style={{ padding:16, display:'flex', flexDirection:'column', gap:10 }}>
          <div style={{
            border:'1px dashed var(--border)', borderRadius:'var(--radius)',
            padding:'10px 14px', textAlign:'center', fontSize:11, color:'var(--text-muted)',
          }}>
            {I.paste} Paste here — image, URL, or text
          </div>

          {mode==='link' && (
            <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://..." autoFocus
              style={{
                background:'var(--bg)', border:'1px solid var(--border)',
                borderRadius:'var(--radius)', padding:'8px 12px',
                fontSize:13, color:'var(--text)', outline:'none',
              }}
            />
          )}

          {mode==='image' && (
            <div>
              {imageData ? (
                <div style={{ position:'relative', marginBottom:8 }}>
                  <img src={imageData} alt="" style={{ width:'100%', maxHeight:200, objectFit:'contain', borderRadius:'var(--radius)', background:'#111' }} />
                  <button onClick={()=>{setImageData(null);setImageFile(null);}} style={{
                    position:'absolute', top:6, right:6, background:'rgba(0,0,0,0.7)',
                    border:'none', borderRadius:3, padding:'3px 5px', color:'#fff', cursor:'pointer',
                  }}>{I.x}</button>
                </div>
              ) : (
                <button onClick={()=>fileRef.current?.click()} style={{
                  width:'100%', padding:'24px 0', background:'var(--bg)',
                  border:'1px dashed var(--border-active)', borderRadius:'var(--radius)',
                  color:'var(--text-dim)', cursor:'pointer', fontSize:13,
                }}>
                  {I.camera} Choose image or paste from clipboard
                </button>
              )}
              <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{ display:'none' }} />
            </div>
          )}

          <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Title (auto-generated)"
            style={{
              background:'var(--bg)', border:'1px solid var(--border)',
              borderRadius:'var(--radius)', padding:'8px 12px',
              fontSize:13, color:'var(--text)', outline:'none',
            }}
          />
          <textarea value={note} onChange={e=>setNote(e.target.value)}
            placeholder={mode==='text' ? 'Your note...' : 'Add a note...'}
            rows={mode==='text'?4:2}
            style={{
              background:'var(--bg)', border:'1px solid var(--border)',
              borderRadius:'var(--radius)', padding:'8px 12px',
              fontSize:13, color:'var(--text)', outline:'none', resize:'vertical',
            }}
          />
          <select value={collection} onChange={e=>setCollection(e.target.value)} style={{
            background:'var(--bg)', border:'1px solid var(--border)',
            borderRadius:'var(--radius)', padding:'8px 12px',
            fontSize:13, color:'var(--text)', outline:'none',
          }}>
            <option value="">Unsorted</option>
            {collections.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select>

          <button onClick={submit} disabled={saving} style={{
            background: saving ? 'var(--bg-hover)' : 'var(--accent)',
            color: saving ? 'var(--text-dim)' : 'var(--accent-text)',
            border:'none', borderRadius:'var(--radius)',
            padding:'10px 0', fontSize:13, fontWeight:600, cursor: saving?'wait':'pointer',
            marginTop:4, display:'flex', alignItems:'center', justifyContent:'center', gap:6,
          }}>
            {saving ? <><span className="spinner" /> Saving to cloud...</> : <>{I.cloud} Save to Cloud</>}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────
function App() {
  const [refs, setRefs] = useState([]);
  const [collections, setCollections] = useState([]);
  const [loading, setLoading] = useState(true);
  const [online, setOnline] = useState(navigator.onLine);
  const [activeCollection, setActiveCollection] = useState(null);
  const [activeTag, setActiveTag] = useState(null);
  const [searchQuery, setSearchQuery] = useState('');
  const [viewMode, setViewMode] = useState('masonry');
  const [selectedItem, setSelectedItem] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [dropActive, setDropActive] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const mainRef = useRef(null);
  const { toasts, toast } = useToast();

  const isMobile = typeof window !== 'undefined' && window.innerWidth < 768;

  // Online status
  useEffect(() => {
    const on = () => setOnline(true);
    const off = () => setOnline(false);
    window.addEventListener('online', on);
    window.addEventListener('offline', off);
    return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
  }, []);

  // Load from Supabase
  useEffect(() => {
    (async () => {
      try {
        const [r, c] = await Promise.all([sbGetAll('refs'), sbGetAll('collections')]);
        setRefs(r);
        setCollections(c);
      } catch(e) {
        toast('Failed to load data — check connection', 'error');
        console.error(e);
      }
      setLoading(false);
    })();
  }, []);

  // Realtime sync
  useEffect(() => {
    const channel = supabase
      .channel('grabref-changes')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'refs' }, payload => {
        setRefs(prev => {
          if (prev.find(r => r.id === payload.new.id)) return prev;
          return [payload.new, ...prev];
        });
      })
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'refs' }, payload => {
        setRefs(prev => prev.map(r => r.id === payload.new.id ? payload.new : r));
      })
      .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'refs' }, payload => {
        setRefs(prev => prev.filter(r => r.id !== payload.old.id));
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'collections' }, () => {
        sbGetAll('collections').then(c => setCollections(c)).catch(() => {});
      })
      .subscribe();
    return () => supabase.removeChannel(channel);
  }, []);

  // Tags
  const allTags = useMemo(() => {
    const map = {};
    refs.forEach(r => r.tags?.forEach(t => { map[t] = (map[t]||0)+1; }));
    return Object.entries(map).sort((a,b)=>b[1]-a[1]).map(([t])=>t);
  }, [refs]);

  // Filter
  const filteredRefs = useMemo(() => {
    let items = refs;
    if (activeCollection) items = items.filter(r => r.collection_id === activeCollection);
    if (activeTag) items = items.filter(r => r.tags?.includes(activeTag));
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      items = items.filter(r =>
        (r.title||'').toLowerCase().includes(q) ||
        (r.note||'').toLowerCase().includes(q) ||
        (r.source_url||'').toLowerCase().includes(q) ||
        r.tags?.some(t=>t.includes(q))
      );
    }
    return items;
  }, [refs, activeCollection, activeTag, searchQuery]);

  // CRUD
  async function addRef(item) {
    setRefs(prev => [item, ...prev]);
    try {
      await sbUpsert('refs', item);
      toast('Saved to cloud ☁️', 'success');
    } catch(e) {
      toast('Save failed — check connection', 'error');
    }
  }

  async function updateRef(item) {
    setRefs(prev => prev.map(r => r.id===item.id ? item : r));
    setSelectedItem(item);
    try {
      await sbUpsert('refs', item);
      toast('Updated ✓', 'success');
    } catch(e) {
      toast('Update failed', 'error');
    }
  }

  async function deleteRef(id) {
    const item = refs.find(r => r.id===id);
    setRefs(prev => prev.filter(r => r.id!==id));
    if (selectedItem?.id===id) setSelectedItem(null);
    try {
      if (item?.storage_path) await sbDeleteImage(item.storage_path);
      await sbDelete('refs', id);
      toast('Deleted', 'info');
    } catch(e) {
      toast('Delete failed', 'error');
    }
  }

  async function addCollection(name) {
    const c = { id: uid(), name, created_at: Date.now() };
    setCollections(prev => [...prev, c]);
    try { await sbUpsert('collections', c); } catch(e) { toast('Failed to save collection', 'error'); }
  }

  async function deleteCollection(id) {
    setCollections(prev => prev.filter(c => c.id!==id));
    if (activeCollection===id) setActiveCollection(null);
    try { await sbDelete('collections', id); } catch(e) {}
  }

  // Drop handlers
  function handleDragOver(e) { e.preventDefault(); setDropActive(true); }
  function handleDragLeave(e) { if (!e.relatedTarget || e.relatedTarget===document.documentElement) setDropActive(false); }
  async function handleDrop(e) {
    e.preventDefault();
    setDropActive(false);

    if (e.dataTransfer.files?.length) {
      for (const file of e.dataTransfer.files) {
        if (file.type.startsWith('image/')) {
          try {
            const path = `${uid()}.jpg`;
            const thumbUrl = await sbUploadImage(file, path);
            const ref = {
              id: uid(), type:'image',
              title: file.name.replace(/\.[^.]+$/,''),
              note:null, source_url:null,
              thumbnail_url: thumbUrl, storage_path: path,
              collection_id: activeCollection||null,
              tags:[], created_at:Date.now(),
            };
            ref.tags = autoTag(ref);
            await addRef(ref);
          } catch(err) { toast('Upload failed', 'error'); }
        }
      }
      return;
    }

    const html = e.dataTransfer.getData('text/html');
    const url = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain');

    if (html) {
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const imgs = doc.querySelectorAll('img');
      if (imgs.length) {
        for (const img of imgs) {
          if (img.src && img.src.startsWith('http')) {
            const ref = {
              id:uid(), type:'image',
              title: img.alt||'Dragged image',
              note:null, source_url: img.src,
              thumbnail_url: img.src, storage_path:null,
              collection_id: activeCollection||null,
              tags:[], created_at:Date.now(),
            };
            ref.tags = autoTag(ref);
            await addRef(ref);
          }
        }
        return;
      }
    }

    if (url && url.match(/^https?:\/\//)) {
      const ref = {
        id:uid(), type:'link',
        title: url.replace(/^https?:\/\/(www\.)?/,'').split('/')[0],
        note:null, source_url: url,
        thumbnail_url: `https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=${encodeURIComponent(url)}&size=128`,
        storage_path:null,
        collection_id: activeCollection||null,
        tags:[], created_at:Date.now(),
      };
      ref.tags = autoTag(ref);
      await addRef(ref);
      return;
    }

    const text = e.dataTransfer.getData('text/plain');
    if (text?.trim()) {
      const ref = {
        id:uid(), type:'text',
        title: text.trim().slice(0,60),
        note: text.trim(), source_url:null,
        thumbnail_url:null, storage_path:null,
        collection_id: activeCollection||null,
        tags:[], created_at:Date.now(),
      };
      ref.tags = autoTag(ref);
      await addRef(ref);
    }
  }

  // Paste anywhere
  useEffect(() => {
    async function handlePaste(e) {
      if (showAdd||selectedItem) return;
      if (document.activeElement?.tagName==='INPUT'||document.activeElement?.tagName==='TEXTAREA') return;
      const items = e.clipboardData?.items;
      if (!items) return;

      for (const item of items) {
        if (item.type.startsWith('image/')) {
          const file = item.getAsFile();
          try {
            const path = `${uid()}.jpg`;
            const thumbUrl = await sbUploadImage(file, path);
            const ref = {
              id:uid(), type:'image', title:'Pasted image',
              note:null, source_url:null,
              thumbnail_url: thumbUrl, storage_path: path,
              collection_id: activeCollection||null,
              tags:[], created_at:Date.now(),
            };
            ref.tags = autoTag(ref);
            await addRef(ref);
          } catch(err) { toast('Upload failed', 'error'); }
          e.preventDefault(); return;
        }
      }

      const text = e.clipboardData.getData('text/plain');
      if (text?.trim()) {
        const isUrl = text.trim().match(/^https?:\/\//);
        const ref = {
          id:uid(), type: isUrl?'link':'text',
          title: isUrl ? text.trim().replace(/^https?:\/\/(www\.)?/,'').split('/')[0] : text.trim().slice(0,60),
          note: isUrl ? null : text.trim(),
          source_url: isUrl ? text.trim() : null,
          thumbnail_url: isUrl ? `https://t0.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=${encodeURIComponent(text.trim())}&size=128` : null,
          storage_path:null,
          collection_id: activeCollection||null,
          tags:[], created_at:Date.now(),
        };
        ref.tags = autoTag(ref);
        await addRef(ref);
        e.preventDefault();
      }
    }
    window.addEventListener('paste', handlePaste);
    return () => window.removeEventListener('paste', handlePaste);
  }, [showAdd, selectedItem, activeCollection]);

  // Keyboard
  useEffect(() => {
    function handleKey(e) {
      if (e.key==='n'&&(e.metaKey||e.ctrlKey)) { e.preventDefault(); setShowAdd(true); }
      if (e.key==='Escape') { setSelectedItem(null); setShowAdd(false); }
      if (e.key==='/'&&!showAdd&&!selectedItem) {
        const a = document.activeElement?.tagName;
        if (a!=='INPUT'&&a!=='TEXTAREA') { e.preventDefault(); document.getElementById('search-input')?.focus(); }
      }
    }
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [showAdd, selectedItem]);

  // Columns
  const [columns, setColumns] = useState(3);
  useEffect(() => {
    const update = () => {
      const w = mainRef.current?.offsetWidth || window.innerWidth;
      setColumns(w<400?2 : w<700?3 : w<1000?4 : 5);
    };
    update();
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, []);

  const masonryColumns = useMemo(() => {
    const cols = Array.from({ length:columns }, ()=>[]);
    filteredRefs.forEach((item,i) => cols[i%columns].push(item));
    return cols;
  }, [filteredRefs, columns]);

  const collectionName = activeCollection
    ? collections.find(c=>c.id===activeCollection)?.name||'Collection'
    : 'All References';

  return (
    <AppCtx.Provider value={{}}>
      <div onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop}
        style={{ display:'flex', height:'100%', position:'relative' }}
      >
        {/* Drop overlay */}
        {dropActive && (
          <div style={{
            position:'fixed', inset:0, zIndex:800,
            background:'rgba(232,168,56,0.06)',
            border:'3px dashed var(--accent)', borderRadius:8,
            display:'flex', alignItems:'center', justifyContent:'center',
            pointerEvents:'none',
          }}>
            <div style={{
              background:'var(--bg-card)', padding:'24px 40px',
              borderRadius:'var(--radius-lg)', textAlign:'center',
              border:'1px solid var(--accent)',
            }}>
              <div style={{ fontSize:32, marginBottom:8 }}>+</div>
              <div style={{ fontWeight:600, fontSize:15 }}>Drop to save to cloud</div>
              <div style={{ fontSize:12, color:'var(--text-dim)', marginTop:4 }}>Images, links, or text</div>
            </div>
          </div>
        )}

        <Sidebar
          collections={collections}
          activeCollection={activeCollection} setActiveCollection={setActiveCollection}
          onAddCollection={addCollection} onDeleteCollection={deleteCollection}
          allTags={allTags} activeTag={activeTag} setActiveTag={setActiveTag}
          isMobile={isMobile} isOpen={sidebarOpen} onClose={()=>setSidebarOpen(false)}
        />

        <div ref={mainRef} style={{ flex:1, display:'flex', flexDirection:'column', height:'100%', overflow:'hidden' }}>
          {/* Toolbar */}
          <div style={{
            padding:'10px 16px', borderBottom:'1px solid var(--border)',
            display:'flex', alignItems:'center', gap:10,
            background:'var(--bg)', flexWrap:'wrap',
          }}>
            {isMobile && (
              <button onClick={()=>setSidebarOpen(true)} style={{ background:'none', border:'none', color:'var(--text)', cursor:'pointer', padding:4 }}>
                {I.menu}
              </button>
            )}

            <div style={{ fontWeight:600, fontSize:14, minWidth:80 }}>{collectionName}</div>
            <span style={{ fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-mono)' }}>{filteredRefs.length}</span>

            {/* Online indicator */}
            <div style={{
              display:'flex', alignItems:'center', gap:4,
              fontSize:10, color: online?'var(--success)':'var(--danger)',
              fontFamily:'var(--font-mono)',
            }}>
              {online ? I.wifi : I.wifiOff}
              {online ? 'synced' : 'offline'}
            </div>

            <div style={{ flex:1 }} />

            {/* Search */}
            <div style={{
              display:'flex', alignItems:'center', gap:6,
              background:'var(--bg-card)', border:'1px solid var(--border)',
              borderRadius:'var(--radius)', padding:'5px 10px',
              minWidth: isMobile?120:200, maxWidth:300,
            }}>
              {I.search}
              <input id="search-input" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}
                placeholder="Search... ( / )"
                style={{ border:'none', background:'none', outline:'none', color:'var(--text)', fontSize:12, width:'100%' }}
              />
              {searchQuery && (
                <button onClick={()=>setSearchQuery('')} style={{ background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', padding:0 }}>{I.x}</button>
              )}
            </div>

            {/* View toggles */}
            <div style={{ display:'flex', gap:2, background:'var(--bg-card)', borderRadius:'var(--radius)', padding:2, border:'1px solid var(--border)' }}>
              {[['masonry',I.masonry],['grid',I.grid],['list',I.list]].map(([mode,icon]) => (
                <button key={mode} onClick={()=>setViewMode(mode)} style={{
                  background: viewMode===mode?'var(--bg-hover)':'transparent',
                  border:'none', borderRadius:3, padding:'4px 7px',
                  color: viewMode===mode?'var(--text)':'var(--text-muted)', cursor:'pointer',
                }}>{icon}</button>
              ))}
            </div>

            <button onClick={()=>setShowAdd(true)} style={{
              background:'var(--accent)', color:'var(--accent-text)',
              border:'none', borderRadius:'var(--radius)',
              padding:'6px 12px', fontSize:12, fontWeight:600, cursor:'pointer',
              display:'flex', alignItems:'center', gap:4, whiteSpace:'nowrap',
            }}>{I.plus} Add</button>
          </div>

          {/* Filters */}
          {(activeTag||searchQuery) && (
            <div style={{ padding:'6px 16px', display:'flex', gap:6, alignItems:'center', borderBottom:'1px solid var(--border)' }}>
              {activeTag && <Tag label={activeTag} active removable onRemove={()=>setActiveTag(null)} />}
              {searchQuery && <span style={{ fontSize:11, color:'var(--text-dim)' }}>"{searchQuery}"</span>}
            </div>
          )}

          {/* Content */}
          <div style={{ flex:1, overflow:'auto', padding:16 }}>
            {loading ? (
              <div style={{ textAlign:'center', padding:60, color:'var(--text-muted)' }}>
                <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:8, fontSize:14 }}>
                  <span className="spinner" /> Loading from cloud...
                </div>
              </div>
            ) : filteredRefs.length===0 ? (
              <div style={{ textAlign:'center', padding:'60px 20px', color:'var(--text-muted)' }}>
                <div style={{ opacity:0.3, marginBottom:16 }}>{I.inbox}</div>
                <div style={{ fontSize:15, fontWeight:600, color:'var(--text-dim)', marginBottom:6 }}>
                  {searchQuery ? 'No matches' : 'Drop something here'}
                </div>
                <div style={{ fontSize:12, maxWidth:300, margin:'0 auto', lineHeight:1.5 }}>
                  {searchQuery
                    ? 'Try different keywords or clear filters'
                    : 'Drag images, paste URLs, screenshot & drop. Press ⌘N to add manually.'
                  }
                </div>
              </div>
            ) : viewMode==='masonry' ? (
              <div style={{ display:'flex', gap:12 }}>
                {masonryColumns.map((col,i) => (
                  <div key={i} style={{ flex:1 }}>
                    {col.map(item => <RefCard key={item.id} item={item} onSelect={setSelectedItem} onDelete={deleteRef} />)}
                  </div>
                ))}
              </div>
            ) : viewMode==='grid' ? (
              <div style={{
                display:'grid',
                gridTemplateColumns:`repeat(auto-fill, minmax(${isMobile?'140px':'200px'}, 1fr))`,
                gap:12,
              }}>
                {filteredRefs.map(item => <RefCard key={item.id} item={item} onSelect={setSelectedItem} onDelete={deleteRef} compact />)}
              </div>
            ) : (
              <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
                {filteredRefs.map(item => (
                  <div key={item.id} className="animate-in"
                    onClick={()=>setSelectedItem(item)}
                    style={{
                      display:'flex', alignItems:'center', gap:12,
                      padding:'8px 12px',
                      background:'var(--bg-card)', border:'1px solid var(--border)',
                      borderRadius:'var(--radius)', cursor:'pointer',
                    }}
                  >
                    {item.thumbnail_url && (
                      <img src={item.thumbnail_url} alt="" style={{ width:40, height:40, objectFit:'cover', borderRadius:3, flexShrink:0, background:'#111' }} />
                    )}
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:13, fontWeight:500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                        {item.title||'Untitled'}
                      </div>
                      <div style={{ fontSize:11, color:'var(--text-muted)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                        {item.source_url||item.note||''}
                      </div>
                    </div>
                    <div style={{ display:'flex', gap:3, flexShrink:0 }}>
                      {item.tags?.slice(0,2).map(t=><Tag key={t} label={t} />)}
                    </div>
                    <span style={{ fontSize:10, color:'var(--text-muted)', flexShrink:0 }}>
                      {new Date(item.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}
                    </span>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        {showAdd && <AddModal onClose={()=>setShowAdd(false)} onAdd={addRef} collections={collections} />}
        {selectedItem && (
          <DetailModal item={selectedItem} onClose={()=>setSelectedItem(null)} onUpdate={updateRef} onDelete={deleteRef} />
        )}

        <Toast toasts={toasts} />
      </div>
    </AppCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
